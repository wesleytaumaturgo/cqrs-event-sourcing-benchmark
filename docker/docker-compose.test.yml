# PostgreSQL efêmero para testes de integração
# Usado por: Testcontainers (gerenciado automaticamente)
# Uso manual: docker compose -f docker/docker-compose.test.yml up -d

services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: cqrs_benchmark_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    tmpfs:
      - /var/lib/postgresql/data   # Sem volume: dados descartados ao parar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d cqrs_benchmark_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
